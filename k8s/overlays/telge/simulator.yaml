apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: simulator-route
spec:
  hostnames:
    - telge.iteam.pub
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simulator
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    spec:
      containers:
        - name: simulator
          resources:
            requests:
              cpu: "1500m"
              memory: "2Gi"
            limits:
              cpu: "3"
              memory: "4Gi"
      initContainers:
        - name: elastic-init
          image: ghcr.io/predictivemovement/telge-twin-simulator:2.6.69 # {"$imagepolicy": "flux-system:simulator"}
          imagePullPolicy: Always
          env:
            - name: ELASTICSEARCH_URL
              value: http://elasticsearch-master.elasticsearch.svc.cluster.local:9200
          command: ["node", "dist/preboot.js"]
