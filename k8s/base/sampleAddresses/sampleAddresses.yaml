apiVersion: v1
kind: Service
metadata:
  name: sample-address
spec:
  ports:
    - port: 4001
      targetPort: 4001
  selector:
    app: sample-address
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-address
spec:
  selector:
    matchLabels:
      app: sample-address
  template:
    metadata:
      labels:
        app: sample-address
    spec:
      containers:
        - name: sample-address
          image: ghcr.io/predictivemovement/telge-twin-sample:2.6.64 # {"$imagepolicy": "flux-system:sample"}
          ports:
            - containerPort: 4001
          resources:
            requests:
              cpu: "0.1"
              memory: "100Mi"
          env:
            - name: PELIAS_HOSTNAME
              value: http://elasticsearch-master.elasticsearch.svc.cluster.local:9200
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sample-address-route
spec:
  parentRefs:
    - name: telge-http-gateway
      namespace: envoy-gateway-system
  hostnames:
    - streams.telge.iteam.pub
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /addresses
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: sample-address
          port: 4001
      timeouts:
        backendRequest: 360s
